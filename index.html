<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONGLE DONGLE KINGDOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 상단 내비게이션 바 -->
    <header class="navbar">
        <div class="logo"><a href="#">DONGLE DONGLE</a></div>
        <nav class="menu">
            <a href="#">WELCOME</a>
            <a href="#">MAP</a>
            <a href="#">CITIZENS</a>
        </nav>
        <div class="lang">KR / EN</div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="container">
        <!-- 왼쪽 섹션: 동글동글 왕국 타이틀 -->
        <section class="left-content">
            <h1 class="main-title">DONGLE<br>DONGLE<br>KINGDOM</h1>
            <p class="subtitle">모든 것이 둥글게 흘러가는 세계, 동글동글 왕국</p>
        </section>

        <!-- 오른쪽 섹션: 비대칭 그리드 (귀여운 캐릭터들) -->
        <section class="right-content">
            <!-- 1. 주황버섯 느낌의 귀여운 오렌지 버섯 캐릭터 -->
            <div class="grid-item item-large">
                <img src="https://images.unsplash.com/photo-1590004953392-5aba2e72269a?q=80&w=1000" alt="Orange Mushroom">
            </div>
            <!-- 2. 슬라임 느낌의 귀여운 젤리장난감 -->
            <div class="grid-item item-small">
                <img src="https://images.unsplash.com/photo-1605722243979-fe0be8158232?q=80&w=1000" alt="Slime Green">
            </div>
            <!-- 3. 수퍼마리오 요시 느낌의 공룡 인형 -->
            <div class="grid-item item-medium">
                <img src="https://images.unsplash.com/photo-1566577134770-3d85bb3a9cc4?q=80&w=1000" alt="Yoshi Dinosaur">
            </div>
            <!-- 4. 왕국의 또 다른 동글동글한 친구 -->
            <div class="grid-item item-long">
                <img src="https://images.unsplash.com/photo-1559251606-c623743a6d76?q=80&w=1000" alt="Cute Round Character">
            </div>
        </section>
    </main>

</body>
</html>
